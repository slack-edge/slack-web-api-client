name: CI Build
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
    - uses: actions/checkout@v7
    - name: Node.js (${{ matrix.node-version }})
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm i
    - name: Compile
      run: npm i && npm run build
    - name: Test
      run: npm run ci-test

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v7
    - name: Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22.x
        cache: 'npm'
    - run: npm i
    - name: Lint
      run: npm run lint
